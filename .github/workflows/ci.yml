name: ci

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frontend
  DISPATCH_REPOSITORY: ${{ vars.DISPATCH_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository layout
        env:
          REPOSITORY_DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
        run: |
          test -f package.json
          test -f package-lock.json
          test -f Dockerfile
          test -f next.config.mjs -o -f next.config.js
          test -d app -o -d pages
          test -n "${DISPATCH_REPOSITORY}"
          test -n "${REPOSITORY_DISPATCH_TOKEN}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: docker/setup-buildx-action@v3

      - id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}:dev

  dispatch:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
          repository: ${{ env.DISPATCH_REPOSITORY }}
          event-type: image-pushed
          client-payload: |
            {
              "tag": "${{ needs.build-and-push.outputs.sha_tag }}"
            }
