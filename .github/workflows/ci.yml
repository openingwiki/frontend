name: Frontend CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: frontend
  DISPATCH_REPOSITORY: openingwiki/infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate repository layout
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          test -f package.json
          test -f Dockerfile
          test -n "${DISPATCH_REPOSITORY}"
          test -n "${GH_PAT}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-fund --no-audit
          fi

      - name: Build frontend
        run: npm run build

      - uses: docker/setup-buildx-action@v3

      - id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}:dev

  dispatch:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ env.DISPATCH_REPOSITORY }}
          event-type: deploy-dev
          client-payload: |
            {
              "tag": "${{ needs.build-and-push.outputs.sha_tag }}"
            }